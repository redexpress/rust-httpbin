name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --target ${{ matrix.target }}

      - name: rename binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp axum-httpbin.exe axum-httpbin-${{ matrix.target }}.exe
          else
            cp axum-httpbin axum-httpbin-${{ matrix.target }}
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: axum-httpbin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/axum-httpbin-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: axum-httpbin-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: axum-httpbin-*
